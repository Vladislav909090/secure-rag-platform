# ...existing code...
name: lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, iam, knowledge, rag, ai-inference]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Setup protoc
        uses: arduino/setup-protoc@v3

      - name: Setup Go workspace
        run: go work init ./services/ai-inference ./services/gateway ./services/iam ./services/knowledge ./services/rag ./tools/grpcstubgen

      - name: Install proto tools
        run: make proto:tools

      - name: Generate proto stubs
        run: make proto:gen

      - name: Run golangci-lint (${{ matrix.service }})
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: services/${{ matrix.service }}
          args: ./...
