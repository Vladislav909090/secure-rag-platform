syntax = "proto3";

package knowledge.v1;

option go_package = "secure-rag-platform/api/gen/go/knowledge/v1;knowledgev1";

import "google/api/annotations.proto";
import "google/api/httpbody.proto";
import "google/protobuf/struct.proto";

// KnowledgeService — управление базой знаний.
service KnowledgeService {
  // Health проверяет работоспособность knowledge.
  rpc Health(HealthRequest) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/knowledge/api/health"
    };
  }

  // CreateDocumentStream создаёт документ с файлом через client-streaming.
  rpc CreateDocumentStream(stream CreateDocumentStreamRequest) returns (CreateDocumentResponse);

  // DeleteDocument выполняет soft delete документа.
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse) {
    option (google.api.http) = {
      delete: "/knowledge/api/v1/documents/{document_uuid}"
    };
  }

  // RestoreDocument восстанавливает ранее удалённый документ.
  rpc RestoreDocument(RestoreDocumentRequest) returns (RestoreDocumentResponse) {
    option (google.api.http) = {
      post: "/knowledge/api/v1/documents/{document_uuid}/restore"
    };
  }

  // ListDocuments возвращает список активных документов.
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse) {
    option (google.api.http) = {
      get: "/knowledge/api/v1/documents"
    };
  }

  // GetDocument возвращает документ.
  rpc GetDocument(GetDocumentRequest) returns (GetDocumentResponse) {
    option (google.api.http) = {
      get: "/knowledge/api/v1/documents/{document_uuid}"
    };
  }

  // DownloadFile скачивает файл документа.
  rpc DownloadFile(DownloadFileRequest) returns (google.api.HttpBody) {
    option (google.api.http) = {
      get: "/knowledge/api/v1/documents/{document_uuid}/file"
    };
  }

  // UpdateDocument обновляет title и/или description.
  rpc UpdateDocument(UpdateDocumentRequest) returns (UpdateDocumentResponse) {
    option (google.api.http) = {
      patch: "/knowledge/api/v1/documents/{document_uuid}"
      body: "*"
    };
  }

  // UpdateDocumentAttributes заменяет attributes документа.
  rpc UpdateDocumentAttributes(UpdateDocumentAttributesRequest) returns (UpdateDocumentAttributesResponse) {
    option (google.api.http) = {
      patch: "/knowledge/api/v1/documents/{document_uuid}/attributes"
      body: "*"
    };
  }

  // ReindexDocument помечает документ для повторной индексации.
  rpc ReindexDocument(ReindexDocumentRequest) returns (ReindexDocumentResponse) {
    option (google.api.http) = {
      post: "/knowledge/api/v1/documents/{document_uuid}/reindex"
    };
  }
}

// --- Health ---

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

// --- Domain ---

message Document {
  int64 id = 1;
  string uuid = 2;
  string title = 3;
  string description = 4;
  google.protobuf.Struct attributes = 5;
  string file_name = 6;
  string file_extension = 7;
  string mime_type = 8;
  int64 size_bytes = 9;
  string checksum_sha256 = 10;
  string storage_key = 11;
  string index_status = 12;
  string created_at = 13;
  string updated_at = 14;
  string deleted_at = 15;
}

// --- Delete ---

message DeleteDocumentRequest {
  string document_uuid = 1;
}

message DeleteDocumentResponse {
  string document_uuid = 1;
  bool deleted = 2;
  string deleted_at = 3;
}

// --- Restore ---

message RestoreDocumentRequest {
  string document_uuid = 1;
}

message RestoreDocumentResponse {
  Document document = 1;
}

// --- List ---

message ListDocumentsRequest {}

message DocumentItem {
  Document document = 1;
}

message ListDocumentsResponse {
  repeated DocumentItem items = 1;
}

// --- Get ---

message GetDocumentRequest {
  string document_uuid = 1;
}

message GetDocumentResponse {
  Document document = 1;
}

// --- Update ---

message UpdateDocumentRequest {
  string document_uuid = 1;
  optional string title = 2;
  optional string description = 3;
}

message UpdateDocumentResponse {
  Document document = 1;
}

// --- Update Attributes ---

message UpdateDocumentAttributesRequest {
  string document_uuid = 1;
  google.protobuf.Struct attributes = 2;
}

message UpdateDocumentAttributesResponse {
  Document document = 1;
}

// --- Reindex ---

message ReindexDocumentRequest {
  string document_uuid = 1;
}

message ReindexDocumentResponse {
  string document_uuid = 1;
  string index_status = 2;
}

// --- Create Document Stream ---

message CreateDocumentMeta {
  string title = 1;
  optional string description = 2;
  google.protobuf.Struct attributes = 3;
  string file_name = 4;
  string mime_type = 5;
}

message FileChunk {
  bytes data = 1;
}

message CreateDocumentStreamRequest {
  oneof payload {
    CreateDocumentMeta meta = 1;
    FileChunk chunk = 2;
  }
}

message CreateDocumentResponse {
  Document document = 1;
}

// --- Download File ---

message DownloadFileRequest {
  string document_uuid = 1;
}
