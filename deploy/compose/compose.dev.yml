networks:
  dev-expose-net:
    driver: bridge

services:
  iam:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=secure-rag-platform_traefik-net"
      - "traefik.http.routers.iam.rule=PathPrefix(`/iam`)"
      - "traefik.http.routers.iam.entrypoints=web"
      - "traefik.http.routers.iam.priority=100"
      - "traefik.http.services.iam.loadbalancer.server.port=8081"
    networks:
      - traefik-net
      - app-net
      - iam-db-net
      - iam-redis-net

  knowledge:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=secure-rag-platform_traefik-net"
      - "traefik.http.routers.knowledge.rule=PathPrefix(`/knowledge`)"
      - "traefik.http.routers.knowledge.entrypoints=web"
      - "traefik.http.routers.knowledge.priority=100"
      - "traefik.http.services.knowledge.loadbalancer.server.port=8082"
    networks:
      - traefik-net
      - app-net
      - knowledge-db-net
      - knowledge-minio-net

  rag:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=secure-rag-platform_traefik-net"
      - "traefik.http.routers.rag.rule=PathPrefix(`/rag`)"
      - "traefik.http.routers.rag.entrypoints=web"
      - "traefik.http.routers.rag.priority=100"
      - "traefik.http.services.rag.loadbalancer.server.port=8083"
    networks:
      - traefik-net
      - app-net
      - rag-db-net
      - knowledge-minio-net

  iam-db:
    networks:
      - iam-db-net
      - dev-expose-net
    ports:
      - "5433:5432"

  iam-redis:
    networks:
      - iam-redis-net
      - dev-expose-net
    ports:
      - "6380:6379"

  knowledge-db:
    networks:
      - knowledge-db-net
      - dev-expose-net
    ports:
      - "5434:5432"

  rag-db:
    networks:
      - rag-db-net
      - dev-expose-net
    ports:
      - "5435:5432"

  knowledge-minio:
    networks:
      - knowledge-minio-net
      - dev-expose-net
    ports:
      - "9001:9001"

  ai-inference:
    networks:
      - app-net
      - dev-expose-net
    ports:
      - "9094:9094"
