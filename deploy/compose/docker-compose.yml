name: secure-rag-platform

volumes:
  gateway-postgres-data:
  iam-postgres-data:
  knowledge-postgres-data:
  knowledge-minio-data:
  rag-postgres-data:

networks:
  traefik-net:
    driver: bridge

  app-net:
    driver: bridge
    internal: true

  gateway-db-net:
    driver: bridge
    internal: true

  iam-db-net:
    driver: bridge
    internal: true

  knowledge-db-net:
    driver: bridge
    internal: true

  knowledge-minio-net:
    driver: bridge
    internal: true

  rag-db-net:
    driver: bridge
    internal: true

services:
  traefik:
    image: traefik:latest
    ports:
      - "80:80"
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - traefik-net

  gateway:
    build:
      context: ../../services/gateway
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - DB_DSN=postgres://gateway:gateway@gateway-db:5432/gateway?sslmode=disable
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=PathPrefix(`/gateway`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.priority=100"
      - "traefik.http.services.gateway.loadbalancer.server.port=8080"
    depends_on:
      - gateway-db
    networks:
      - traefik-net
      - app-net
      - gateway-db-net

  gateway-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gateway
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
    volumes:
      - gateway-postgres-data:/var/lib/postgresql/data
    networks:
      - gateway-db-net

  iam:
    build:
      context: ../../services/iam
      dockerfile: Dockerfile
    environment:
      - PORT=8081
      - DB_DSN=postgres://iam:iam@iam-db:5432/iam?sslmode=disable
    expose:
      - "8081"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=secure-rag-platform_traefik-net"
      - "traefik.http.routers.iam.rule=PathPrefix(`/iam`)"
      - "traefik.http.routers.iam.entrypoints=web"
      - "traefik.http.routers.iam.priority=100"
      - "traefik.http.services.iam.loadbalancer.server.port=8081"
    depends_on:
      - iam-db
    networks:
      - traefik-net
      - app-net
      - iam-db-net

  iam-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iam
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: iam
    volumes:
      - iam-postgres-data:/var/lib/postgresql/data
    networks:
      - iam-db-net

  knowledge:
    build:
      context: ../../services/knowledge
      dockerfile: Dockerfile
    environment:
      - PORT=8082
      - DATABASE_DSN=postgres://knowledge:knowledge@knowledge-db:5432/knowledge?sslmode=disable
      - S3_ENDPOINT=knowledge-minio:9000
      - S3_BUCKET=knowledge
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_USE_SSL=false
    expose:
      - "8082"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=secure-rag-platform_traefik-net"
      - "traefik.http.routers.knowledge.rule=PathPrefix(`/knowledge`)"
      - "traefik.http.routers.knowledge.entrypoints=web"
      - "traefik.http.routers.knowledge.priority=100"
      - "traefik.http.services.knowledge.loadbalancer.server.port=8082"
    depends_on:
      knowledge-db:
        condition: service_started
      knowledge-minio:
        condition: service_healthy
    networks:
      - traefik-net
      - app-net
      - knowledge-db-net
      - knowledge-minio-net

  knowledge-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: knowledge
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
    volumes:
      - knowledge-postgres-data:/var/lib/postgresql/data
    networks:
      - knowledge-db-net

  knowledge-minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - knowledge-minio-data:/data
    networks:
      - knowledge-minio-net

  rag:
    build:
      context: ../../services/rag
      dockerfile: Dockerfile
    environment:
      - PORT=8083
      - DB_DSN=postgres://rag:rag@rag-db:5432/rag?sslmode=disable
    expose:
      - "8083"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=secure-rag-platform_traefik-net"
      - "traefik.http.routers.rag.rule=PathPrefix(`/rag`)"
      - "traefik.http.routers.rag.entrypoints=web"
      - "traefik.http.routers.rag.priority=100"
      - "traefik.http.services.rag.loadbalancer.server.port=8083"
    depends_on:
      - rag-db
    networks:
      - traefik-net
      - app-net
      - rag-db-net

  rag-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    volumes:
      - rag-postgres-data:/var/lib/postgresql/data
    networks:
      - rag-db-net
