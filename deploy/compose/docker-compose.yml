name: secure-rag-platform

volumes:
  iam-postgres-data:
  iam-redis-data:
  knowledge-postgres-data:
  knowledge-minio-data:
  rag-postgres-data:

networks:
  traefik-net:
    driver: bridge

  app-net:
    driver: bridge
    internal: true

  egress-net:
    driver: bridge

  iam-db-net:
    driver: bridge
    internal: true

  iam-redis-net:
    driver: bridge
    internal: true

  knowledge-db-net:
    driver: bridge
    internal: true

  knowledge-minio-net:
    driver: bridge
    internal: true

  rag-db-net:
    driver: bridge
    internal: true

services:
  traefik:
    image: traefik:latest
    ports:
      - "80:80"
      - "8090:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ../traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - traefik-net

  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    environment:
      - PORT=8080
      - IAM_GRPC_ADDR=iam:9091
      - KNOWLEDGE_GRPC_ADDR=knowledge:9092
      - RAG_GRPC_ADDR=rag:9093
      - GATEWAY_DEFAULT_TOP_K=8
      - DISABLE_AUTH=false
      - DISABLE_DOC_FILTER=false
      - OPA_URL=http://opa:8181
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=secure-rag-platform_traefik-net"
      - "traefik.http.routers.gateway.rule=PathPrefix(`/gateway`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.priority=100"
      - "traefik.http.services.gateway.loadbalancer.server.port=8080"
    depends_on:
      opa:
        condition: service_started
    networks:
      - traefik-net
      - app-net

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "--addr=0.0.0.0:8181", "/policies"]
    volumes:
      - ../opa:/policies:ro
    expose:
      - "8181"
    networks:
      - app-net

  iam:
    build:
      context: ../../services/iam
      dockerfile: Dockerfile
    environment:
      - PORT=8081
      - DATABASE_DSN=postgres://iam:iam@iam-db:5432/iam?sslmode=disable
      - REDIS_ADDR=iam-redis:6379
      - JWT_SECRET=dev-iam-jwt-secret
      - JWT_ISSUER=secure-rag-iam
      - JWT_AUDIENCE=secure-rag-gateway
      - BOOTSTRAP_ADMIN_LOGIN=superadmin
      - BOOTSTRAP_ADMIN_PASSWORD=superadmin
    expose:
      - "8081"
    depends_on:
      iam-db:
        condition: service_healthy
      iam-redis:
        condition: service_healthy
    networks:
      - app-net
      - iam-db-net
      - iam-redis-net

  iam-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iam
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: iam
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam -d iam"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - iam-postgres-data:/var/lib/postgresql/data
    networks:
      - iam-db-net

  iam-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - iam-redis-data:/data
    networks:
      - iam-redis-net

  knowledge:
    build:
      context: ../../services/knowledge
      dockerfile: Dockerfile
    environment:
      - PORT=8082
      - DATABASE_DSN=postgres://knowledge:knowledge@knowledge-db:5432/knowledge?sslmode=disable
      - S3_ENDPOINT=knowledge-minio:9000
      - S3_BUCKET=knowledge
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_USE_SSL=false
    expose:
      - "8082"
    depends_on:
      knowledge-db:
        condition: service_healthy
      knowledge-minio:
        condition: service_healthy
    networks:
      - app-net
      - knowledge-db-net
      - knowledge-minio-net

  knowledge-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: knowledge
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - knowledge-postgres-data:/var/lib/postgresql/data
    networks:
      - knowledge-db-net

  knowledge-minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - knowledge-minio-data:/data
    networks:
      - knowledge-minio-net

  rag:
    build:
      context: ../..
      dockerfile: services/rag/Dockerfile
    environment:
      - PORT=8083
      - DATABASE_DSN=postgres://rag:rag@rag-db:5432/rag?sslmode=disable
      - S3_ENDPOINT=knowledge-minio:9000
      - S3_BUCKET=knowledge
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_USE_SSL=false
      - KNOWLEDGE_GRPC_ADDR=knowledge:9092
      - AI_INFERENCE_GRPC_ADDR=ai-inference:9094
    expose:
      - "8083"
    depends_on:
      rag-db:
        condition: service_healthy
      knowledge-minio:
        condition: service_healthy
    networks:
      - app-net
      - rag-db-net
      - knowledge-minio-net

  rag-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - rag-postgres-data:/var/lib/postgresql/data
    networks:
      - rag-db-net

  ai-inference:
    build:
      context: ../../services/ai-inference
      dockerfile: Dockerfile
    environment:
      - GRPC_PORT=9094
      - AI_INFERENCE_PROVIDER_TIMEOUT=180s
    volumes:
      - ../../services/ai-inference/config/models.json:/app/config/models.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "9094"
    networks:
      - app-net
      - egress-net
