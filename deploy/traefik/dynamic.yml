# Динамическая конфигурация Traefik
# Дополнительные маршруты и middleware.
#
# Основная маршрутизация на gateway выполняется через Docker labels
# в docker-compose.yml (traefik.http.routers.gateway.*).
#
# Этот файл для будущих кастомных правил.

http:
  middlewares:
    # Пример: middleware ограничения частоты запросов
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    # Пример: CORS-заголовки
    cors-headers:
      headers:
        accessControlAllowOriginList:
          - "*"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - Authorization
