# Динамическая конфигурация Traefik
# Основная маршрутизация gateway задаётся Docker labels в prod compose

http:
  middlewares:
    # Ограничение частоты запросов
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    # CORS-заголовки
    cors-headers:
      headers:
        accessControlAllowOriginList:
          - "*"
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Content-Type
          - Authorization
