syntax = "proto3";

package gateway.v1;

option go_package = "example.com/project/gateway/gen/v1;gatewayv1";

import "google/api/annotations.proto";

// GatewayService — единая точка входа для внешних клиентов.
service GatewayService {
  // Health проверяет работоспособность gateway.
  rpc Health(HealthRequest) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/v1/gateway/health"
    };
  }

  // Authorize выполняет авторизацию запроса.
  rpc Authorize(AuthorizeRequest) returns (AuthorizeResponse) {
    option (google.api.http) = {
      post: "/v1/gateway/authorize"
      body: "*"
    };
  }
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

message AuthorizeRequest {
  string token = 1;
  string resource = 2;
  string action = 3;
}

message AuthorizeResponse {
  bool allowed = 1;
  string reason = 2;
}
