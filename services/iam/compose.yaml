volumes:
  iam-postgres-data:
  iam-redis-data:
  iam-goose-go-mod-cache:
  iam-goose-go-build-cache:

networks:
  iam-net:
    driver: bridge
  iam-db-net:
    driver: bridge
    internal: true
  iam-redis-net:
    driver: bridge
    internal: true
  iam-migrate-egress-net:
    driver: bridge

services:
  iam:
    build:
      context: ../..
      dockerfile: services/iam/Dockerfile
    environment:
      PORT: "8081"
      GRPC_PORT: "9091"
      DATABASE_DSN: postgres://iam:iam@iam-db:5432/iam?sslmode=disable
      REDIS_ADDR: iam-redis:6379
      JWT_SECRET: dev-iam-jwt-secret
      JWT_ISSUER: secure-rag-iam
      JWT_AUDIENCE: secure-rag-gateway
      BOOTSTRAP_ADMIN_LOGIN: superadmin
      BOOTSTRAP_ADMIN_PASSWORD: superadmin
    depends_on:
      iam-migrate:
        condition: service_completed_successfully
      iam-redis:
        condition: service_healthy
    expose:
      - "8081"
      - "9091"
    networks:
      - iam-net
      - iam-db-net
      - iam-redis-net

  iam-migrate:
    image: golang:1.25-alpine
    working_dir: /workspace
    command:
      - sh
      - -c
      - go run github.com/pressly/goose/v3/cmd/goose@v3.24.3 -dir /migrations postgres 'postgres://iam:iam@iam-db:5432/iam?sslmode=disable' up
    volumes:
      - ./migrations:/migrations:ro
      - iam-goose-go-mod-cache:/go/pkg/mod
      - iam-goose-go-build-cache:/root/.cache/go-build
    depends_on:
      iam-db:
        condition: service_healthy
    networks:
      - iam-db-net
      - iam-migrate-egress-net

  iam-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iam
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: iam
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam -d iam"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - iam-postgres-data:/var/lib/postgresql/data
    networks:
      - iam-db-net

  iam-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - iam-redis-data:/data
    networks:
      - iam-redis-net

