syntax = "proto3";

package knowledge.v1;

option go_package = "secure-rag-platform/services/knowledge/gen/v1;knowledgev1";

import "google/api/annotations.proto";
import "google/api/httpbody.proto";
import "google/protobuf/struct.proto";

// KnowledgeService — управление базой знаний.
service KnowledgeService {
  // Health проверяет работоспособность knowledge.
  rpc Health(HealthRequest) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/knowledge/api/health"
    };
  }

  // CreateDocumentStream создаёт документ с первой версией через client-streaming.
  rpc CreateDocumentStream(stream CreateDocumentStreamRequest) returns (CreateDocumentResponse);

  // UploadVersionStream загружает новую версию документа через client-streaming.
  rpc UploadVersionStream(stream UploadVersionStreamRequest) returns (UploadVersionResponse);

  // DeleteDocument выполняет soft delete документа.
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse) {
    option (google.api.http) = {
      delete: "/knowledge/api/v1/documents/{document_uuid}"
    };
  }

  // RestoreDocument восстанавливает ранее удалённый документ.
  rpc RestoreDocument(RestoreDocumentRequest) returns (RestoreDocumentResponse) {
    option (google.api.http) = {
      post: "/knowledge/api/v1/documents/{document_uuid}/restore"
    };
  }

  // ListDocuments возвращает список активных документов с версиями.
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse) {
    option (google.api.http) = {
      get: "/knowledge/api/v1/documents"
    };
  }

  // GetDocument возвращает документ с его версиями.
  rpc GetDocument(GetDocumentRequest) returns (GetDocumentResponse) {
    option (google.api.http) = {
      get: "/knowledge/api/v1/documents/{document_uuid}"
    };
  }

  // GetDocumentVersion возвращает конкретную версию документа.
  rpc GetDocumentVersion(GetDocumentVersionRequest) returns (GetDocumentVersionResponse) {
    option (google.api.http) = {
      get: "/knowledge/api/v1/documents/{document_uuid}/versions/{version_number}"
    };
  }

  // DownloadFile скачивает файл актуальной версии.
  rpc DownloadFile(DownloadFileRequest) returns (google.api.HttpBody) {
    option (google.api.http) = {
      get: "/knowledge/api/v1/documents/{document_uuid}/file"
    };
  }

  // DownloadVersionFile скачивает файл конкретной версии.
  rpc DownloadVersionFile(DownloadVersionFileRequest) returns (google.api.HttpBody) {
    option (google.api.http) = {
      get: "/knowledge/api/v1/documents/{document_uuid}/versions/{version_number}/file"
    };
  }

  // UpdateDocument обновляет title и/или description.
  rpc UpdateDocument(UpdateDocumentRequest) returns (UpdateDocumentResponse) {
    option (google.api.http) = {
      patch: "/knowledge/api/v1/documents/{document_uuid}"
      body: "*"
    };
  }

  // UpdateDocumentAttributes заменяет attributes документа.
  rpc UpdateDocumentAttributes(UpdateDocumentAttributesRequest) returns (UpdateDocumentAttributesResponse) {
    option (google.api.http) = {
      patch: "/knowledge/api/v1/documents/{document_uuid}/attributes"
      body: "*"
    };
  }

  // ReindexVersion отправляет версию на повторную индексацию.
  rpc ReindexVersion(ReindexVersionRequest) returns (ReindexVersionResponse) {
    option (google.api.http) = {
      post: "/knowledge/api/v1/documents/{document_uuid}/versions/{version_number}/reindex"
    };
  }
}

// --- Health ---

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

// --- Domain ---

message Document {
  int64 id = 1;
  string uuid = 2;
  string title = 3;
  string description = 4;
  google.protobuf.Struct attributes = 5;
  int32 current_version_number = 6;
  string created_at = 7;
  string updated_at = 8;
  string deleted_at = 9;
}

message DocumentVersion {
  int64 id = 1;
  string uuid = 2;
  int64 document_id = 3;
  int32 version_number = 4;
  string file_name = 5;
  string file_extension = 6;
  string mime_type = 7;
  int64 size_bytes = 8;
  string checksum_sha256 = 9;
  string storage_key = 10;
  string index_status = 11;
  string created_at = 12;
  reserved 13;
}

// --- Delete ---

message DeleteDocumentRequest {
  string document_uuid = 1;
}

message DeleteDocumentResponse {
  string document_uuid = 1;
  bool deleted = 2;
  string deleted_at = 3;
}

// --- Restore ---

message RestoreDocumentRequest {
  string document_uuid = 1;
}

message RestoreDocumentResponse {
  Document document = 1;
}

// --- List ---

message ListDocumentsRequest {}

message DocumentWithVersions {
  Document document = 1;
  repeated DocumentVersion versions = 2;
}

message ListDocumentsResponse {
  repeated DocumentWithVersions items = 1;
}

// --- Get ---

message GetDocumentRequest {
  string document_uuid = 1;
}

message GetDocumentResponse {
  Document document = 1;
  repeated DocumentVersion versions = 2;
}

// --- Get Version ---

message GetDocumentVersionRequest {
  string document_uuid = 1;
  int32 version_number = 2;
}

message GetDocumentVersionResponse {
  Document document = 1;
  DocumentVersion version = 2;
}

// --- Update ---

message UpdateDocumentRequest {
  string document_uuid = 1;
  optional string title = 2;
  optional string description = 3;
}

message UpdateDocumentResponse {
  Document document = 1;
}

// --- Update Attributes ---

message UpdateDocumentAttributesRequest {
  string document_uuid = 1;
  google.protobuf.Struct attributes = 2;
}

message UpdateDocumentAttributesResponse {
  Document document = 1;
}

// --- Reindex ---

message ReindexVersionRequest {
  string document_uuid = 1;
  int32 version_number = 2;
}

message ReindexVersionResponse {
  string document_uuid = 1;
  int32 version_number = 2;
  string index_status = 3;
}

// --- Create Document Stream ---

message CreateDocumentMeta {
  string title = 1;
  optional string description = 2;
  google.protobuf.Struct attributes = 3;
  string file_name = 4;
  string mime_type = 5;
}

message FileChunk {
  bytes data = 1;
}

message CreateDocumentStreamRequest {
  oneof payload {
    CreateDocumentMeta meta = 1;
    FileChunk chunk = 2;
  }
}

message CreateDocumentResponse {
  Document document = 1;
  DocumentVersion version = 2;
}

// --- Upload Version Stream ---

message UploadVersionMeta {
  string document_uuid = 1;
  string file_name = 2;
  string mime_type = 3;
}

message UploadVersionStreamRequest {
  oneof payload {
    UploadVersionMeta meta = 1;
    FileChunk chunk = 2;
  }
}

message UploadVersionResponse {
  int64 document_id = 1;
  string document_uuid = 2;
  int32 current_version_number = 3;
  DocumentVersion version = 4;
}

// --- Download File ---

message DownloadFileRequest {
  string document_uuid = 1;
}

// --- Download Version File ---

message DownloadVersionFileRequest {
  string document_uuid = 1;
  int32 version_number = 2;
}
