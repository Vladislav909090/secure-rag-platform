volumes:
  rag-postgres-data:
  rag-goose-go-mod-cache:
  rag-goose-go-build-cache:

networks:
  rag-net:
    driver: bridge
  rag-db-net:
    driver: bridge
    internal: true
  rag-s3-net:
    driver: bridge
    internal: true
  rag-migrate-egress-net:
    driver: bridge

services:
  rag:
    build:
      context: ../..
      dockerfile: services/rag/Dockerfile
    environment:
      PORT: "8083"
      GRPC_PORT: "9093"
      DATABASE_DSN: postgres://rag:rag@rag-db:5432/rag?sslmode=disable
      S3_ENDPOINT: knowledge-minio:9000
      S3_BUCKET: knowledge
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_USE_SSL: "false"
      KNOWLEDGE_GRPC_ADDR: knowledge:9092
      AI_INFERENCE_GRPC_ADDR: ai-inference:9094
      RAG_INDEXED_EMBEDDING_DIMENSION: "768"
    depends_on:
      rag-migrate:
        condition: service_completed_successfully
      knowledge-minio:
        condition: service_healthy
    expose:
      - "8083"
      - "9093"
    networks:
      - rag-net
      - rag-db-net
      - rag-s3-net

  rag-migrate:
    image: golang:1.25-alpine
    working_dir: /workspace
    command:
      - sh
      - -c
      - go run github.com/pressly/goose/v3/cmd/goose@v3.24.3 -dir /migrations postgres 'postgres://rag:rag@rag-db:5432/rag?sslmode=disable' up
    volumes:
      - ./migrations:/migrations:ro
      - rag-goose-go-mod-cache:/go/pkg/mod
      - rag-goose-go-build-cache:/root/.cache/go-build
    depends_on:
      rag-db:
        condition: service_healthy
    networks:
      - rag-db-net
      - rag-migrate-egress-net

  rag-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - rag-postgres-data:/var/lib/postgresql/data
    networks:
      - rag-db-net

